"$schema" = 'https://starship.rs/config-schema.json'

format = """
[](#B19CD8)\
[󰄛](bg:prev_fg)\
[](bg:#BEA9DF fg:prev_bg)\
$directory(bg:prev_bg fg:prev_bg)\
[](bg:#CCB7E5 fg:prev_bg)\
$git_branch\
$git_status\
[](bg:#D9C4EC fg:prev_bg)\
$time\
[ ](fg:prev_bg)\
$cmd_duration\
$line_break\
$character"""

palette = 'catppuccin_frappe'

[directory]
style = "bg:prev_bg fg:crust"
format = "[ $path ]($style)"

[directory.substitutions]
"Documents" = "󰈙 "
"Downloads" = " "
"Music" = "󰝚 "
"Pictures" = " "
"Developer" = "󰲋 "

[cmd_duration]
show_milliseconds = true
format = " in $duration "
style = "bg:prev_fg"
disabled = false
show_notifications = true
min_time_to_notify = 45000

[git_state]
format = '\([$state( $progress_current/$progress_total)]($style)\) '
style = "bg:prev_bg"

[git_branch]
style = "bg:prev_bg fg:crust"
symbol = ""
format = '[[ $symbol $branch ](fg:crust bg:prev_bg)]($style)'

[git_status]
ahead = '⇡${count}'
behind = '⇣${count}'
diverged = '⇡${ahead_count}⇣${behind_count}'
conflicted = '⚠${count}'
stashed = '!${count}'
staged = '+${count}'    # (+) new & modified fils in the staging area
deleted = '-${count}'   # (-) deleted files in the staging area
renamed = '>>${count}'   # (») renamed files in the staging area
modified = '~${count}'  # (~) modified files in the working directory
untracked = '?${count}' # (?) untracked files in the working directory
style = "bg:prev_bg"
format = '[[($all_status$ahead_behind )](fg:crust bg:prev_bg)]($style)'

[time]
disabled = false
time_format = "%R"
style = "bg:prev_bg"
format = '[[  $time ](fg:crust bg:prev_bg)]($style)'

[line_break]
disabled = true

[character]
disabled = false
success_symbol = '[❯](bold fg:green)'
error_symbol = '[❯](bold fg:red)'
vimcmd_symbol = '[❮](bold fg:green)'
vimcmd_replace_one_symbol = '[❮](bold fg:lavender)'
vimcmd_replace_symbol = '[❮](bold fg:lavender)'
vimcmd_visual_symbol = '[❮](bold fg:yellow)'

[os]
disabled = false
style = "bg:prev_bg fg:crust"

[os.symbols]
Windows = ""
Ubuntu = "󰕈"
SUSE = ""
Raspbian = "󰐿"
Mint = "󰣭"
Macos = "󰀵"
Manjaro = ""
Linux = "󰌽"
Gentoo = "󰣨"
Fedora = "󰣛"
Alpine = ""
Amazon = ""
Android = ""
Arch = "󰣇"
Artix = "󰣇"
CentOS = ""
Debian = "󰣚"
Redhat = "󱄛"
RedHatEnterprise = "󱄛"


[aws]
disabled = true
