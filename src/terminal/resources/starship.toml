palette = "catppuccin_frappe"

[aws]
format = ""

[java]
format = ''

[git_state]
format = '\([$state( $progress_current/$progress_total)]($style)\) '
style = "bright-purple"

[git_branch]
style = "bright-green"

# [git_commit]
# format = "\b[ ﰖ $hash](fg:white bg:$style)[](fg:$style)"
# # style = "bright-black"

[git_status]
style = "maroon"
ahead = '⇡${count}'
behind = '⇣${count}'
diverged = '⇡${ahead_count}⇣${behind_count}'
conflicted = '⚠${count}'
stashed = '!${count}'
staged = '+${count}'    # (+) new & modified fils in the staging area
deleted = '-${count}'   # (-) deleted files in the staging area
renamed = '>>${count}'   # (») renamed files in the staging area
modified = '~${count}'  # (~) modified files in the working directory
untracked = '?${count}' # (?) untracked files in the working directory

[cmd_duration]
format = "took [$duration]($style)"
# style = "bold yellow"

[character]
success_symbol = "[[󰄛](green) ❯](peach)"
error_symbol = "[[󰄛](red) ❯](peach)"
vimcmd_symbol = "[󰄛 ❮](subtext1)" # For use with zsh-vi-mode

[directory]
truncation_length = 4
# Catppuccin 'lavender'
style = "lavender"

[palettes.catppuccin_frappe]
rosewater = "#f2d5cf"
flamingo = "#eebebe"
pink = "#f4b8e4"
mauve = "#ca9ee6"
red = "#e78284"
maroon = "#ea999c"
peach = "#ef9f76"
yellow = "#e5c890"
green = "#a6d189"
teal = "#81c8be"
sky = "#99d1db"
sapphire = "#85c1dc"
blue = "#8caaee"
lavender = "#babbf1"
text = "#c6d0f5"
subtext1 = "#b5bfe2"
subtext0 = "#a5adce"
overlay2 = "#949cbb"
overlay1 = "#838ba7"
overlay0 = "#737994"
surface2 = "#626880"
surface1 = "#51576d"
surface0 = "#414559"
base = "#303446"
mantle = "#292c3c"
crust = "#232634"

[username]
format = ""

[line_break]
disabled = true

[time]
disabled = true
style = "flamingo"
format = 'at [\[$time\]]($style) '
utc_time_offset = "local"

# ~/.config/starship.toml
